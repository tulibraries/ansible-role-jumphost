---
# tasks file for ansible-role-jumphost
- name: Ensure jumphost ssh directory exists
  ansible.builtin.file:
    path: "{{ jumphost_ssh_dir }}"
    state: directory
    mode: "0700"

- name: Create the jumphost ssh config
  ansible.builtin.template:
    src: ssh.config.j2
    dest: "{{ jumphost_ssh_config_path }}"
    mode: "0600"
